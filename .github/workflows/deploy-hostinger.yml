name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci || npm install --force
      - name: Build static site
        run: npm run build
      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r out/* deploy/
      - name: Deploy to branch hostinger-deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./deploy
          publish_branch: hostinger-deploy
          github_token: ${{ secrets.GITHUB_TOKEN }} 